name: Label — Stale

# Marks issues and PRs as "pa: stale" after 30 days of inactivity,
# then closes them after a further 7 days if there is still no response.
# Items with "pa: blocked" or "pa: priority: critical/high" are exempt.

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday at 09:00 UTC
  workflow_dispatch:        # Allow manual runs from the Actions tab

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest

    steps:
      - name: Run stale action
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          stale-issue-label:   "pa: stale"
          stale-issue-message: >
            👋 This issue has had no activity for **30 days**.
            It has been marked as `pa: stale` and will be closed in **7 days**
            unless there is new activity.

            If this is still relevant, please leave a comment or push an update.
            Maintainers can remove the `pa: stale` label to keep it open.

          close-issue-message: >
            🔒 This issue was closed automatically after **37 days** of inactivity.
            Feel free to re-open it if the problem persists or more information
            becomes available.

          days-before-issue-stale: 30
          days-before-issue-close: 7

          # Pull Requests
          stale-pr-label:   "pa: stale"
          stale-pr-message: >
            👋 This pull request has had no activity for **30 days**.
            It has been marked as `pa: stale` and will be closed in **7 days**
            unless there is new activity.

            If you are still working on this, please push a commit or leave a
            comment. Maintainers can remove the `pa: stale` label to keep it open.

          close-pr-message: >
            🔒 This pull request was closed automatically after **37 days** of
            inactivity. Feel free to re-open it when you are ready to continue.

          days-before-pr-stale: 30
          days-before-pr-close: 7

          # Exemptions
          # Items with any of these labels will never be marked stale.
          exempt-issue-labels: >
            pa: blocked,
            pa: priority: critical,
            pa: priority: high,
            pa: security,
            enhancement: accepted,
            pa: help wanted

          exempt-pr-labels: >
            pa: blocked,
            pa: priority: critical,
            pa: priority: high,
            pa: security,
            pr: work in progress

          # Don't close milestoned issues automatically
          exempt-all-milestones: true

          # Limit how many items are processed per run (avoids rate-limit hits)
          operations-per-run: 100
