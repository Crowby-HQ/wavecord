name: Label — CI Results

# Listens to the "Tests" and "Lint & Type Check" workflows and labels
# the triggering PR accordingly.
#
# ✅ All checks pass  →  remove "pa: priority: critical" hint label (if any)
#                        add    "pr: ready for review"  (if not draft)
# ❌ Tests fail       →  add    "bug: confirmed"
# ❌ Lint/types fail  →  add    "typing"
#
# This workflow uses workflow_run so it can write labels even on PRs from forks
# (fork PRs don't have write permission in pull_request workflows).

on:
  workflow_run:
    workflows:
      - "Tests"
      - "Lint & Type Check"
    types:
      - completed

permissions:
  pull-requests: write
  contents: read

jobs:
  label-ci:
    name: Sync CI labels
    runs-on: ubuntu-latest

    steps:
      - name: Find associated PR number
        id: find-pr
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            // workflow_run doesn't give us a PR number directly — we look it up
            const run = context.payload.workflow_run;
            if (!run) return '';

            // For push events there is no PR — skip
            if (run.event !== 'pull_request') return '';

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${run.head_repository.owner.login}:${run.head_branch}`,
            });

            return prs.data.length > 0 ? String(prs.data[0].number) : '';

      - name: Apply / remove labels based on CI outcome
        if: steps.find-pr.outputs.result != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pr       = Number('${{ steps.find-pr.outputs.result }}');
            const run      = context.payload.workflow_run;
            const success  = run.conclusion === 'success';
            const workflow = run.name;

            const add = async (label) => {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: pr, labels: [label],
                });
              } catch (_) {}
            };

            const remove = async (label) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: pr, name: label,
                });
              } catch (_) {}
            };

            // Tests workflow
            if (workflow === 'Tests') {
              if (!success) {
                await add('bug: confirmed');
                await remove('pr: ready for review');
              } else {
                await remove('bug: confirmed');
                // Restore ready-for-review if PR is not a draft
                const { data: prData } = await github.rest.pulls.get({
                  owner: context.repo.owner, repo: context.repo.repo,
                  pull_number: pr,
                });
                if (!prData.draft) {
                  await add('pr: ready for review');
                }
              }
            }

            // Lint & Type Check workflow
            if (workflow === 'Lint & Type Check') {
              if (!success) {
                await add('typing');
              } else {
                await remove('typing');
              }
            }
