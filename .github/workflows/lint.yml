name: Lint & Type Check

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with lint,dev --no-interaction

      - name: Run Ruff (Lint)
        run: poetry run ruff check wavecord tests

      - name: Get Pyright version
        id: pyright_version
        run: echo "version=$(poetry run python -c 'import pyright; print(pyright.__pyright_version__)')" >> $GITHUB_OUTPUT

      - name: Run Pyright (Linux)
        uses: jakebailey/pyright-action@v3
        with:
          version: ${{ steps.pyright_version.outputs.version }}
          python-version: ${{ matrix.python-version }}
          python-platform: Linux
          no-comments: ${{ matrix.python-version != '3.13' }}
          warnings: true

      - name: Run Pyright (Windows)
        uses: jakebailey/pyright-action@v3
        if: success() || failure()
        with:
          version: ${{ steps.pyright_version.outputs.version }}
          python-version: ${{ matrix.python-version }}
          python-platform: Windows
          no-comments: true
          warnings: true
