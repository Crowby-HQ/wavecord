name: Label — Pull Requests

# Automatically manages PR labels based on state, reviews, and CI results.
# Required permission: pull-requests: write  (granted below)

on:
  pull_request:
    types:
      - opened
      - reopened
      - converted_to_draft
      - ready_for_review
      - synchronize          # new commit pushed
  pull_request_review:
    types:
      - submitted
      - dismissed
  pull_request_target:
    types: [opened]          # Dependabot PRs land here

permissions:
  pull-requests: write
  contents: read

jobs:
  # 1. Draft ↔ Ready
  pr-state:
    name: PR state labels
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      contains(fromJson('["opened","reopened","converted_to_draft","ready_for_review"]'),
               github.event.action)

    steps:
      - name: Remove both state labels first
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ['pr: work in progress', 'pr: ready for review'];
            for (const label of labels) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: label,
                });
              } catch (_) { /* label wasn't present – that's fine */ }
            }

      - name: Add correct state label
        uses: actions/github-script@v7
        with:
          script: |
            const isDraft = context.payload.pull_request.draft;
            const label   = isDraft ? 'pr: work in progress' : 'pr: ready for review';
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });

  # 2. Review feedback
  pr-review:
    name: Review labels
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review'

    steps:
      - name: Sync review labels
        uses: actions/github-script@v7
        with:
          script: |
            const state = context.payload.review.state.toLowerCase();
            const pr    = context.payload.pull_request.number;

            const add    = async (l) => github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, labels: [l],
            });
            const remove = async (l) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: pr, name: l,
                });
              } catch (_) {}
            };

            if (state === 'changes_requested') {
              await add('pr: changes requested');
              await remove('pr: ready for review');
            } else if (state === 'approved') {
              await remove('pr: changes requested');
              // keep "ready for review" — it's approved and still open
            } else if (state === 'dismissed') {
              // review dismissed → back to ready for review
              await remove('pr: changes requested');
              await add('pr: ready for review');
            }

  # 3. Dependabot
  pr-dependabot:
    name: Dependabot label
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' &&
      github.actor == 'dependabot[bot]'

    steps:
      - name: Add dependencies label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['pr: dependencies'],
            });

  # 4. New commit on a PR → remove "changes requested"
  pr-new-commit:
    name: Reset changes-requested on new push
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'synchronize'

    steps:
      - name: Remove changes requested label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'pr: changes requested',
              });
            } catch (_) {}
            // Restore ready-for-review only if PR is not a draft
            if (!context.payload.pull_request.draft) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['pr: ready for review'],
              });
            }
