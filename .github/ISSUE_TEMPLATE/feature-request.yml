name: Feature Request
description: Suggest a new feature or improvement for WaveCord
labels:
  - "enhancement"

body:
  - type: markdown
    attributes:
      value: |
        ### Feature Request 💡
        Thanks for helping improve WaveCord! Describe your idea below.

  - type: input
    attributes:
      label: Summary
      description: A one-line description of the feature.
      placeholder: e.g. Add built-in queue management
    validations:
      required: true

  - type: textarea
    attributes:
      label: Problem to Solve
      description: What limitation or pain point does this address?
      placeholder: Currently there's no built-in way to manage a track queue.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution
      description: How should this feature work? What would the API look like?
      placeholder: |
        A `Queue` class that supports `add()`, `skip()`, `shuffle()`.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives Considered
      description: Any workarounds or other approaches you've thought about?

  - type: textarea
    attributes:
      label: Additional Context
      description: Links, references, or anything else that might help.
